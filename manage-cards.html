<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Cards - CardScope.io</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a2332 100%);
            color: #e1e8ed;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8899a6;
            margin-bottom: 2rem;
        }

        .back-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            margin-bottom: 2rem;
            padding: 0.75rem 1.25rem;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #8899a6;
            font-size: 0.9rem;
        }

        .actions {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .cards-list {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        .card-item {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-item:last-child {
            border-bottom: none;
        }

        .card-info {
            flex: 1;
        }

        .card-player {
            font-size: 1.25rem;
            font-weight: 700;
            color: #e1e8ed;
            margin-bottom: 0.25rem;
        }

        .card-details {
            color: #8899a6;
            font-size: 0.9rem;
        }

        .card-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #667eea;
            margin: 0 2rem;
        }

        .btn-delete {
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 6px;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #8899a6;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Homepage</a>
        
        <h1>Manage User Listings</h1>
        <p class="subtitle">View and manage all user-submitted card listings</p>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="userCardCount">0</div>
                <div class="stat-label">User Listings</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCardCount">16</div>
                <div class="stat-label">Total Cards</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-danger" onclick="clearAllUserCards()">Clear All User Listings</button>
        </div>

        <div class="cards-list" id="cardsList">
            <div class="empty-state">
                <div class="empty-state-icon">📦</div>
                <p>No user-submitted cards yet</p>
            </div>
        </div>
    </div>

    <script>
        function loadCards() {
            const stored = localStorage.getItem('userCards');
            const userCards = stored ? JSON.parse(stored) : [];

            document.getElementById('userCardCount').textContent = userCards.length;
            document.getElementById('totalCardCount').textContent = 16 + userCards.length;

            const cardsList = document.getElementById('cardsList');

            if (userCards.length === 0) {
                cardsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📦</div>
                        <p>No user-submitted cards yet</p>
                    </div>
                `;
                return;
            }

            cardsList.innerHTML = userCards.map((card, index) => `
                <div class="card-item">
                    <div class="card-info">
                        <div class="card-player">${card.player}</div>
                        <div class="card-details">${card.year} ${card.brand} • ${card.type} • ${card.condition || 'Ungraded'}</div>
                    </div>
                    <div class="card-price">${card.price}</div>
                    <button class="btn-delete" onclick="deleteCard(${index})">Delete</button>
                </div>
            `).join('');
        }

        function deleteCard(index) {
            if (!confirm('Are you sure you want to delete this card?')) {
                return;
            }

            const stored = localStorage.getItem('userCards');
            const userCards = stored ? JSON.parse(stored) : [];
            
            userCards.splice(index, 1);
            localStorage.setItem('userCards', JSON.stringify(userCards));
            
            loadCards();
        }

        function clearAllUserCards() {
            if (!confirm('Are you sure you want to delete ALL user-submitted cards? This cannot be undone.')) {
                return;
            }

            localStorage.removeItem('userCards');
            loadCards();
            alert('All user-submitted cards have been deleted.');
        }

        // Load cards on page load
        loadCards();
    </script>
</body>
</html>
